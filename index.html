<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Lớp 10H-K28</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Giữ nguyên toàn bộ CSS của bạn từ đây... */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f3e8ff, #d8b4fe, #a78bfa);
            scroll-behavior: smooth;
        }
        .banner img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .menu { position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(12px); background: linear-gradient(135deg, #c084fc, #8b5cf6, #6d28d9); padding: 12px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.4); }
        .menu ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; gap: 35px; }
        .menu ul li a { text-decoration: none; font-size: 18px; font-weight: 600; color: white; padding: 10px 20px; border-radius: 30px; transition: 0.3s ease; }
        .menu ul li a:hover { background: rgba(255,255,255,0.25); transform: translateY(-3px); }
        .header { padding: 40px 50px; background: radial-gradient(circle at top left, #c084fc, #a78bfa, #ede9fe); color: #4c1d95; text-align: center; }
        .content-wrapper { background: rgba(255,255,255,0.6); padding: 30px 50px 40px; border-radius: 20px; margin: 25px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .title { text-align: center; font-size: 40px; color: #5b2b82; margin-bottom: 25px; font-weight: bold; }
        .content { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .icon-box { display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #fdf4ff, #f5d0fe); border: 2px solid #c084fc; border-radius: 14px; padding: 16px 20px; cursor: pointer; transition: 0.3s; }
        .icon-box:hover { transform: translateY(-4px); background: linear-gradient(135deg, #fbcfe8, #e9d5ff); }
        input[type="checkbox"] { display: none; }
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .popup-content { background: white; padding: 30px; border-radius: 16px; max-width: 600px; width: 90%; position: relative; }
        .popup-img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        #post1:checked ~ #popup1, #post2:checked ~ #popup2, #post3:checked ~ #popup3, #post4:checked ~ #popup4, #post5:checked ~ #popup5, #post6:checked ~ #popup6, #post7:checked ~ #popup7, #post8:checked ~ #popup8, #post9:checked ~ #popup9 { display: flex; }
        .footer { background: linear-gradient(135deg,#58257b,#b56ddf); color:white; padding:40px 20px; margin-top: 40px; text-align: center; }
        .music-control { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #8b5cf6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3000; }
        /* ...Kết thúc phần CSS thu gọn của bạn */
    </style>
</head>
<body>

    <div class="banner">
        <img src="banner.jpg" alt="Banner lớp 10">
    </div>

    <div class="menu">
        <ul>
            <li><a href="#">Trang chủ</a></li>
            <li><a href="#">Giới thiệu</a></li>
            <li><a href="#">Kỷ niệm</a></li>
            <li><a href="#">Thành viên</a></li>
            <li><a href="#lienhe">Liên hệ</a></li>
        </ul>
    </div>

    <div class="header">
        <h1>Chào mừng đến với lớp 10H-K28</h1>
        <p>Nơi lưu giữ những kỷ niệm đáng nhớ nhất thời cấp 3!</p>
    </div>

    <div class="content-wrapper">
        <h2 class="title">NHỮNG KỶ NIỆM ĐÁNG NHỚ</h2>
        <div class="content">
            <label for="post1" class="icon-box">📘 Lời mở đầu</label>
            <label for="post2" class="icon-box">🎉 Khai giảng</label>
            <label for="post3" class="icon-box">🍃 20/11 + 8/3</label>
            <label for="post4" class="icon-box">🌱 19/11 + 6/4</label>
            <label for="post5" class="icon-box">🌸 Hoạt động khác</label>
            <label for="post6" class="icon-box">🪻 Liên hoan</label>
            <label for="post7" class="icon-box">🌊 Sinh nhật thầy cô</label>
            <label for="post8" class="icon-box">🍀 Thời học sinh</label>
            <label for="post9" class="icon-box">🪷 Lời kết</label>
        </div>
    </div>

    <input type="checkbox" id="post1">
    <input type="checkbox" id="post2">
    <input type="checkbox" id="post3">
    <input type="checkbox" id="post4">
    <input type="checkbox" id="post5">
    <input type="checkbox" id="post6">
    <input type="checkbox" id="post7">
    <input type="checkbox" id="post8">
    <input type="checkbox" id="post9">

    <div class="popup" id="popup1">
        <label for="post1" style="position:absolute; width:100%; height:100%;"></label>
        <div class="popup-content">
            <h3>Lời mở đầu</h3>
            <p>Nội dung lời mở đầu của bạn ở đây...</p>
            <label for="post1" style="cursor:pointer; color:purple;">[Đóng]</label>
        </div>
    </div>
    <footer class="footer" id="lienhe">
        <p>© 2026 10H-K28 | Chuyên Hùng Vương 💜</p>
    </footer>

    <audio id="bgMusic" loop>
        <source src="nhacnen.mp3" type="audio/mpeg">
    </audio>

    <div class="music-control" onclick="toggleMusic()">🎵</div>

    <script>
        const music = document.getElementById("bgMusic");
        let isPlaying = false;
        function toggleMusic() {
            if (isPlaying) { music.pause(); } 
            else { music.play().catch(e => console.log("Cần tương tác để phát nhạc")); }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
